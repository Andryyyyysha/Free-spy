databases:
  - name: freepy-db
    plan: free

services:
  - type: web
    name: free-spy
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: freepy-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: USER_ID
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: TIMEZONE_NAME
        value: Europe/Moscow
